services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tftms"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/sql/views.sql:/docker-entrypoint-initdb.d/02_views.sql:ro
      - ./backend/sql/procedures.sql:/docker-entrypoint-initdb.d/03_procedures.sql:ro
      - ./backend/sql/triggers.sql:/docker-entrypoint-initdb.d/04_triggers.sql:ro
      - ./backend/sql/seed.sql:/docker-entrypoint-initdb.d/05_seed.sql:ro

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DB_ECHO: ${DB_ECHO}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8000:8000
    develop:
      watch:
        - action: sync+restart
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/requirements.txt

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - 3000:3000
    develop:
      watch:
        - action: sync+restart
          path: ./frontend/src
          target: /app/src
        - action: sync+restart
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/vite.config.ts

volumes:
  db_data:
