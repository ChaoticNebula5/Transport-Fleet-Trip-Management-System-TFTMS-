services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tftms"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/views.sql:/docker-entrypoint-initdb.d/02_views.sql:ro
      - ./sql/procedures.sql:/docker-entrypoint-initdb.d/03_procedures.sql:ro
      - ./sql/triggers.sql:/docker-entrypoint-initdb.d/04_triggers.sql:ro

  api:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DB_ECHO: ${DB_ECHO}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8000:8000

volumes:
  db_data:

